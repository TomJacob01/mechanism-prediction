# Conda environment for mech_uspto.
#
# Default install assumes a CUDA 12.4-capable GPU (A40 / L40S / RTX 30+ /
# RTX 40+ / H100). For CPU-only, replace `pytorch-cuda=12.4` and the
# `nvidia` channel with `cpuonly`.
#
# Why this matters: PyPI's default `torch` wheel for Linux is CPU-only with
# no warning. Without this pin a routine `pip install torch` will silently
# train on CPU on the cluster (~50x slower; see May 2026 incident).
#
# Usage:
#   conda env create -f environment.yml
#   conda activate mechuspto
#   pip install -e ".[dev]"

name: mechuspto
channels:
  - pytorch
  - nvidia
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11
  - pip

  # Scientific Python
  - numpy
  - tqdm
  - matplotlib

  # Chemistry
  - rdkit

  # PyTorch with CUDA 12.4. For CPU-only swap `pytorch-cuda=12.4` for `cpuonly`
  # and drop the `nvidia` channel above.
  - pytorch=2.5.1
  - pytorch-cuda=12.4

  # Dev tooling
  - pytest>=7
  - ruff>=0.4
  - pre-commit>=3

  # PyG and the package itself install via pip — PyG's conda packaging lags
  # the pip wheels, and `-e .` requires pip anyway.
  - pip:
      - torch_geometric
